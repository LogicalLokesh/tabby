name: Bug Report
description: Something isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: input
    id: version
    attributes:
      label: Tabby Version
      description: Find the version in the bottom of the popup (e.g. v1.0.1).
      placeholder: v1.0.1
    validations:
      required: true

  - type: input
    id: chrome_version
    attributes:
      label: Chrome Version
      placeholder: "e.g. 124.0.6367.91"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the extension popup
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, console errors, or anything else that might help.
