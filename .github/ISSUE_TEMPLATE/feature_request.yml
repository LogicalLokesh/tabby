name: Feature Request
description: Suggest an idea or improvement for Tabby.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the frustration or gap you're running into.
      placeholder: "I often find myself wanting to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe your proposed solution
      description: How should this work? Be as specific as you like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other approaches you thought about?

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, links, or anything that helps paint the picture.
